<!DOCTYPE html>
<html>
<head>
<title>Interact</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style type="text/css">
body{margin:0;}
</style>
</head>
<body>
<canvas id="myCanvas" height="300" width="300" ></canvas>
<script type="text/javascript">

var canvas = document.getElementById("myCanvas");
var c = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight - 10;
var mouse = {
	x: undefined,
	y: undefined
}
window.addEventListener("touchmove",function(event){
	mouse.x = event.touches[0].clientX;
	mouse.y = event.touches[0].clientY;
	
});


function Circle(x ,y ,dx ,dy ,radius ,color){
this.x = x;
this.y = y;
this.dx = dx;
this.dy = dy;
this.radius = radius;
this.color = color;
this.draw = function(){
			c.beginPath();
			c.arc(this.x ,this.y ,this.radius ,0 ,Math.PI * 2 ,true);
			c.fillStyle = this.color;
			c.fill();
			}
this.update = function(){
			if(this.x >= canvas.width - this.radius){
				this.dx = -1 * this.dx;
			}else if(this.x < this.radius){
				this.dx = Math.floor(Math.random()* 10);
			}
			
			if(this.y >= canvas.height - this.radius){
				this.dy = -1 * this.dy;
			}else if(this.y < this.radius){
				this.dy = Math.floor(Math.random()* 10);
			}
			this.x += this.dx;
			this.y += this.dy;
			
			this.draw();
			
			if(mouse.x - this.x < 40 && mouse.y - this.y < 40 &&
			mouse.x - this.x > -40 && mouse.x - this.x > -40){
				if(this.radius < 50){
					this.radius += 2.4;
				}
			}else if(this.radius > 25){
				this.radius -= 2.4;
			}else{
				this.radius = 25;
			}
			
		}
}
var circleArray = [];
for(var i=0;i < 60;i++){

var dx = Math.floor(Math.random()* 5);
var dy = Math.floor(Math.random()* 5);
var radi = Math.floor(Math.random()* 7);
var radius = radi + 10;
var x1 = Math.floor(Math.random()* (canvas.width-radius)+radius);
var x = x1 - radius;
var y1 = Math.floor(Math.random()* (canvas.height-radius)+radius);
var y = y1 - radius;
var colors = ["red","green","blue","aqua","navy","purple","yellow","teal"];
var color = colors[Math.floor(Math.random()* colors.length)];
 circleArray.push(new Circle(x,y ,dx ,dy ,radius ,color));

}
 
 function animate(){
 
 requestAnimationFrame(animate);
 c.clearRect(0 ,0 ,innerWidth ,innerHeight );
 	for(var j=0;j <circleArray.length;j++){
 	circleArray[j].update();
 	}
 
 }
 animate();
</script>
</body>
</html>
