<!DOCTYPE html>
<html>
<head>
<title></title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style type="text/css">
*{margin:0;padding:0;}
canvas{margin:0;box-sizing:border-box;}
</style>
</head>
<body>
<canvas id="myCanvas" height="350" width="300" ></canvas>
<script type="text/javascript">

var canvas = document.getElementById("myCanvas");
var c = canvas.getContext("2d");
canvas.height =window.innerHeight-5;
canvas.width = window.innerWidth;
//utility functions
function randInt(min, max){
return Math.floor(Math.random() * (max - min - 1) + min + 1);
}

function distance(x1 ,y1 ,x2 , y2){
 xVal = x2 - x1;
 yVal = y2 -y1;
 var next = Math.pow(xVal,2) + Math.pow(yVal,2);
 return Math.sqrt(next);
 }
 
 
 document.addEventListener("touchmove",function(event){
 mouse.x = event.touches[0].clientX;
 mouse.y = event.touches[0].clientY; 
 });
 mouse={x:150,
 		y:175}
 
 //above are utility functions
function Ball(x ,y ,radius ,color){
this.x = x;
this.y = y;
this.velocity = 0.05;
this.radius = radius;
this.radians = Math.random() * Math.PI * 2;
this.color = color;
this.distance = randInt(90,130);
this.lastMouse = {x:x,y:y}
this.update = function(){
	//Drag effect
	this.lastMouse.x += (mouse.x - this.lastMouse.x)*0.05;
	this.lastMouse.y += (mouse.y - this.lastMouse.y)*0.05;
	
	const lastPos = {x: this.x, y: this.y}
	this.radians += this.velocity;
	this.x = this.lastMouse.x + Math.cos(this.radians) * this.distance;
	this.y = this.lastMouse.y + Math.sin(this.radians) * this.distance;
	this.draw(lastPos);
}
this.draw = function(lastPos){
	c.beginPath();
	c.strokeStyle = this.color;
	c.lineWidth = this.radius;
	c.moveTo(lastPos.x,lastPos.y);
	c.lineTo(this.x,this.y);
	c.stroke();
	c.closePath();
}

}
//initializing
//colors
colors = ["#EEBDFF","#4D39CE","#000EFF"]; 
 var ball;
function init() {
	 ball = [];
	 
	 for(var i=0;i<40;i++){
		color = colors[randInt(0,colors.length)];
		var radius = randInt(1,7);
		var x = canvas.width/2;
		var y = canvas.height/2;
 		ball.push(new Ball(x, y, radius, color));
 	}
 	
 }
 
 function animate(){
 	requestAnimationFrame(animate);
 	c.fillStyle = "rgba(255,255,255,.05)";
 	c.fillRect(0 ,0 ,innerWidth ,innerHeight );
 	
 	for(var a=0;a<ball.length;a++){
 		ball[a].update();
 	}
 }
 
 //setTimeout(function(){
 //c.clearRect(0 ,0 ,innerWidth ,innerHeight );
 //},1000);
 
 init();
 animate();
 
</script>
</body>
</html>
