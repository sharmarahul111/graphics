<!DOCTYPE html>
<html>
<head>
<title>Collision 3</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style type="text/css">
body{margin:0;}
</style>
</head>
<body>
<canvas id="myCanvas"></canvas>
<script type="text/javascript">

var canvas = document.getElementById("myCanvas");
var c = canvas.getContext("2d");
canvas.height = innerHeight-5;
canvas.width  = innerWidth;
//utility functions
function randInt(min, max){
return Math.floor(Math.random() * (max - min - 1) + min + 1);
}

function distance(x1 ,y1 ,x2 , y2){
 xVal = x2 - x1;
 yVal = y2 -y1;
 var next = Math.pow(xVal,2) + Math.pow(yVal,2);
 return Math.sqrt(next);
 }
 
 function rotate(velocity, angle){
 	const rotatedV = {
 		x: velocity.x * Math.cos(angle) - velocity.y * Math.sin(angle),
 		y: velocity.x * Math.sin(angle) + velocity.y * Math.cos(angle)
 	}
 return rotatedV;
 }
 
 //biggest
 function resolveCollision(particle, otherParticle){
 	const xVelocityDiff = particle.velocity.x - otherParticle.velocity.x;
 	const yVelocityDiff = particle.velocity.y - otherParticle.velocity.y;
 	
 	const xDist = otherParticle.x - particle.x;
 	const yDist = otherParticle.y - particle.y;
 	
 	//Prevent accidental overlap of ball
 	if(xVelocityDiff * xDist + yVelocityDiff * yDist >= 0){
 		
 		//Grab angle between the two colliding ball
 		const angle = -Math.atan2(otherParticle.y - particle.y, otherParticle.x - particle.x);
 		
 		//store mass in var for better readability in collision detection equation
 		const m1 = particle.mass;
 		const m2 = otherParticle.mass;
 		
 		//velocity before equation
 		const u1 = rotate(particle.velocity, angle);
 		const u2 = rotate(otherParticle.velocity, angle);
 		
 		//velocity after 1d collision equation 
 		const v1 = {x: (u1.x * (m1 - m2) + u2.x *2* m2) /(m1 + m2), y: u1.y };
 		const v2 = {x: (u2.x * (m1 - m2) + u1.x *2* m2) /(m1 + m2), y: u2.y };
 		
 		//final velocity after rotating axis back to original location 
 		const vFinal1 = rotate(v1, -angle);
 		const vFinal2 = rotate(v2, -angle);
 		
 		//swap particle velocity for realistic bounce effect
 		particle.velocity = vFinal1;
 		otherParticle.velocity = vFinal2;
 		}
 }
 //above are utility functions
function Ball(x ,y ,radius ,color){
this.x = x;
this.y = y;
this.velocity = {
x: (Math.random() -0.5)* 3 + 2,
y: (Math.random() -0.5)* 3 + 2
}
this.radius = radius;
this.color = color;
this.mass = 1;
this.draw = function(){
		c.beginPath();
		c.arc(this.x ,this.y ,this.radius ,0 ,Math.PI * 2 ,true);
		c.fillStyle = this.color;
		c.stroke();
		c.fill();
		c.closePath();
	}
this.update = function(){
				this.draw();
				
			for(var b=0;b<ball.length;b++){
				if(this == ball[b]){continue;}
				if(distance(this.x,this.y, ball[b].x, ball[b].y) - this.radius * 2 <= 0){
					resolveCollision(this, ball[b]);
				}
			}
			
			
			//for not letting the bubbles out of the box #easy
			if(this.x - this.radius <= 0 || this.x + this.radius >= canvas.width){this.velocity.x = -this.velocity.x;}
			if(this.y - this.radius <= 0 || this.y + this.radius >= canvas.height){this.velocity.y = -this.velocity.y;}
			
			
			this.x += this.velocity.x;
			this.y += this.velocity.y;
			
			}
}
//initializing
//colors
colors = ["red","green","blue","aqua","frunchise","yellow","pink"]; 
 var ball;
function init() {
 ball = [];
 
 for(var i=0;i<15;i++){
 color = colors[randInt(0,colors.length)];
 var radius = 30;
 var x = randInt(radius, canvas.width - radius);
 var y = randInt(radius, canvas.height - radius);
 //making sure the cootdinates don't overlap wach other
 	if(!i==0){
 		for(var j=0;j<ball.length;j++){
 			if(distance(x ,y ,ball[j].x ,ball[j].y) - radius * 2 < 0){
 			x = randInt(radius, canvas.width - radius);
 			y = randInt(radius, canvas.height - radius);
 			
 			j = -1;
 			}
 		}
 	}
 
 ball.push(new Ball(x, y, radius, color));
 }
 
 }
 init();
 
 function animate(){
 requestAnimationFrame(animate);
 c.clearRect(0 ,0 ,innerWidth ,innerHeight );
 	for(var a=0;a<ball.length;a++){
 		ball[a].update();
 	}
 }
 animate();
 document.addEventListener("click",function(){
 c.clearRect(0 ,0 ,innerWidth ,innerHeight );
 init();
 });
</script>
</body>
</html>
