<!DOCTYPE html>
<html>
<head>
<title>Central Player Game</title>
<meta name="theme-color" content="black">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=0">
<style type="text/css">
*{margin:0;padding:0;}
</style>
</head>
<body>
<canvas></canvas>

<script type="text/javascript">
const canvas = document.querySelector("canvas");
canvas.width = innerWidth;
canvas.height = innerHeight;
const c = canvas.getContext("2d");
var center = {x:canvas.width/2,y:canvas.height/2};

class Player{
	constructor(x,y,radius,color){
		this.x = x;
		this.y = y;
		this.color = color;
		this.radius = radius;
	}
	draw(){
		c.beginPath();
		c.arc(this.x,this.y,this.radius,0,Math.PI*2,true);
		c.fillStyle = this.color;
		c.shadowColor = "#000077";
		c.shadowBlur = 20;
		c.fill();
	}

}

class Bullet{
	constructor(x,y,radius,color,velocity){
		this.x = x;
		this.y = y;
		this.color = color;
		this.radius = radius;
		this.velocity = velocity;
	}
	draw(){
		c.beginPath();
		c.arc(this.x,this.y,this.radius,0,Math.PI*2,true);
		c.fillStyle = this.color;
		c.fill();
	}
	update(){
	this.draw();
	this.x += this.velocity.x;
	this.y += this.velocity.y;
	
	}
}

const player = new Player(center.x,center.y,30,'blue');
var bullets = [];
var enemies = [];
var frameId;

function createEnemy(){
	setInterval(()=>{
		let radius = Math.random()*(30 - 5) + 5;
		let x,y;
		if(Math.random() < 0.5){
			x = (Math.random() < 0.5)?0-radius:canvas.width+radius;
			y = Math.random()*canvas.height;
		}else{
			y = (Math.random() < 0.5)?0-radius:canvas.height+radius;
			x = Math.random()*canvas.width;
		}
		let angle = Math.atan2(canvas.height/2-y ,canvas.width/2 - x);
		enemies.push(new Bullet(x,y,radius,'red',{
		x:Math.cos(angle),
		y:Math.sin(angle)
		}));
	},900);
}
addEventListener("click",(e) =>{
	let angle = Math.atan2(e.clientY - canvas.height/2 ,e.clientX - canvas.width/2);
	bullets.push(new Bullet(center.x,center.y,6,'green',{
		x:Math.cos(angle),
		y:Math.sin(angle)
	}));
});
function animate(){
	frameId = requestAnimationFrame(animate);
	c.fillStyle = 'rgba(0,0,0,.06)';
	c.fillRect(0,0,canvas.width,canvas.height);
	player.draw();
	enemies.forEach((enemy,index) =>{
		enemy.update();
		
		if(Math.hypot(enemy.x - player.x,enemy.y - player.y) < player.radius + enemy.radius){
		cancelAnimationFrame(frameId);
		}
		
		bullets.forEach((bullet,bIndex)=>{
		if(Math.hypot(enemy.x - bullet.x,enemy.y - bullet.y) < bullet.radius + enemy.radius){
		setTimeout(()=>{bullets.splice(bIndex,1);enemies.splice(index,1);},0);
		}
		});
	});
	
	bullets.forEach((bullet,index)=>{
		bullet.update();
		if(bullet.x + bullet.radius < 0 || bullet.x - bullet.radius > canvas.width || bullet.y + bullet.radius < 0 || bullet.y - bullet.radius > canvas.height){
			setTimeout(function(){
				bullets.splice(index,1);
			},0);
		}
		
	});
}

animate();
createEnemy();
</script>
</body>
</html>
